version: "3.8"

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: recipe
      MARIADB_USER: recipe-user
      MARIADB_PASSWORD: recipe-wawo
      MARIADB_ROOT_PASSWORD: root-recipe
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - recipe-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: recipe-user
      DB_PASSWORD: recipe-wawo
      DB_NAME: recipe
    depends_on:
      db:
        condition: service_healthy
    networks:
      - recipe-network

volumes:
  db_data:

networks:
  recipe-network:
    driver: bridge
